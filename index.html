<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
</head>

<body>
    <div class="container flex bg-black">
        <div class="left">
            <div class="home rounded bg-grey m-1 p-1">
                <div class="logo invert icon-width"><img src="logo.svg" alt="Spotify"></div>
                <ul>
                    <li><img class="font-bold invert icon-width" src="home.svg" alt="Home">Home</li>
                    <li><img class="font-bold invert icon-width" src="search.svg" alt="Search">Search</li>
                </ul>
            </div>
            <div class="library rounded bg-grey m-1 p-1">
                <div class="playlist flex"><img class="font-bold icon-width invert" src="playlist.svg"
                        alt="Playlist">Your Library
                </div>
            </div>
        </div>
        <div class="right">
            right container
        </div>

    </div>
</body>

</html>
